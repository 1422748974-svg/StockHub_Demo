<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>StockHub · 多券商集中管理站</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  font-size: 13px; color: #dedede; background: #0f1115;
  line-height: 1.45; -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; font-size: inherit; color: inherit; }
input, select { font-family: inherit; font-size: 14px; background: #1a1d24; color: #dedede; border: 1px solid #2a2d35; border-radius: 6px; padding: 8px 10px; width: 100%; }
input:focus, select:focus { outline: none; border-color: #3a7bd5; }

/* === App Shell === */
#app { display: flex; flex-direction: column; height: 100vh; max-width: 420px; margin: 0 auto; position: relative; overflow: hidden; }

/* === Status Bar === */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px 4px; font-size: 11px; color: #888; flex-shrink: 0;
}

/* === Top Header === */
.app-header {
  display: flex; align-items: center; padding: 6px 16px 10px; flex-shrink: 0;
  justify-content: space-between;
}
.app-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.app-header-right { display: flex; gap: 12px; align-items: center; }
.header-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #1a1d24; font-size: 14px; }

/* === Index Ticker Strip === */
.index-strip {
  display: flex; gap: 12px; padding: 0 16px 12px; overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none; -ms-overflow-style: none;
}
.index-strip::-webkit-scrollbar { display: none; }
.index-chip {
  flex-shrink: 0; background: #1a1d24; border-radius: 8px; padding: 8px 12px;
  min-width: 100px;
}
.index-chip .idx-name { font-size: 10px; color: #888; }
.index-chip .idx-val { font-size: 15px; font-weight: 600; margin-top: 1px; }
.index-chip .idx-chg { font-size: 11px; margin-top: 1px; }

/* === Main Scroll Area === */
.main-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }

/* === Section Card === */
.section { padding: 0 16px 14px; }
.section-title {
  font-size: 15px; font-weight: 600; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.section-title .more { font-size: 12px; color: #3a7bd5; font-weight: 400; }
.card {
  background: #1a1d24; border-radius: 10px; padding: 14px;
  border: 1px solid #242730;
}

/* === AI Insight Bar === */
.ai-bar {
  background: linear-gradient(135deg, #1e2d45 0%, #1a2435 100%);
  border-radius: 10px; padding: 12px 14px; margin: 0 16px 14px;
  border: 1px solid #2a3a55; display: flex; gap: 10px; align-items: flex-start;
}
.ai-bar-icon { width: 24px; height: 24px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.ai-bar-text { font-size: 12px; color: #bcc8e0; line-height: 1.6; }
.ai-bar-text b { color: #6ea8fe; }

/* === Hot Stocks List === */
.hot-list { display: flex; flex-direction: column; }
.hot-item {
  display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e2130;
  gap: 10px;
}
.hot-item:last-child { border-bottom: none; }
.hot-rank { width: 20px; font-size: 13px; font-weight: 700; color: #888; text-align: center; flex-shrink: 0; }
.hot-info { flex: 1; min-width: 0; }
.hot-name { font-size: 14px; font-weight: 500; }
.hot-code { font-size: 10px; color: #666; margin-top: 1px; }
.hot-price { text-align: right; flex-shrink: 0; }
.hot-price .price { font-size: 14px; font-weight: 600; }
.hot-price .chg { font-size: 12px; font-weight: 500; margin-top: 1px; }
.hot-action { flex-shrink: 0; }

/* === Buy/Sell Quick Actions === */
.quick-trade-row { display: flex; gap: 8px; margin-top: 12px; }
.btn-quick-trade {
  flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600;
  text-align: center; transition: opacity 0.15s;
}
.btn-quick-trade:active { opacity: 0.7; }

/* === Portfolio Cards === */
.pf-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.pf-stat {
  background: #1e2130; border-radius: 8px; padding: 10px 12px; text-align: center;
}
.pf-stat-label { font-size: 10px; color: #888; }
.pf-stat-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

/* === Holdings Row === */
.holding-row {
  display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e2130; gap: 8px;
}
.holding-row:last-child { border-bottom: none; }
.holding-info { flex: 1; min-width: 0; }
.holding-name { font-size: 13px; font-weight: 500; }
.holding-detail { font-size: 10px; color: #666; margin-top: 2px; }
.holding-pnl { text-align: right; flex-shrink: 0; }
.holding-pnl .pnl-amt { font-size: 13px; font-weight: 600; }
.holding-pnl .pnl-pct { font-size: 11px; margin-top: 1px; }

/* === Price Chart + Txn Markers === */
.chart-wrap { margin: 10px 0; position: relative; }
.chart-wrap svg { width: 100%; height: 180px; }

/* === Trade Record List === */
.txn-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid #1e2130; font-size: 12px;
}
.txn-tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.txn-delete { color: #666; font-size: 14px; padding: 4px; }

/* === AI Pick Tags === */
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.filter-tag {
  padding: 6px 14px; border-radius: 16px; font-size: 12px; border: 1px solid #2a2d35;
  transition: all 0.15s;
}
.filter-tag.active { border-color: #3a7bd5; color: #6ea8fe; background: rgba(58,123,213,0.1); }

/* === Bottom Sheet / Panel === */
.sheet-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.sheet-mask.show { opacity: 1; pointer-events: all; }
.bottom-sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 510;
  background: #16181d; border-radius: 16px 16px 0 0;
  max-height: 85vh; overflow-y: auto; transform: translateY(100%);
  transition: transform 0.25s ease; padding: 20px 16px 30px;
  max-width: 420px; margin: 0 auto;
}
.bottom-sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: #3a3d45; border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
.sheet-close {
  position: absolute; right: 16px; top: 20px; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center; border-radius: 14px;
  background: #1e2130; font-size: 14px;
}

/* === Trade Panel === */
.trade-type-tabs { display: flex; margin-bottom: 14px; border-radius: 8px; overflow: hidden; border: 1px solid #2a2d35; }
.trade-type-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600;
  transition: all 0.15s;
}
.trade-type-tab.active.buy-tab { background: #10b981; color: #fff; }
.trade-type-tab.active.sell-tab { background: #ef4444; color: #fff; }
.trade-form-row { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; }
.trade-form-row label { width: 50px; font-size: 13px; color: #888; flex-shrink: 0; }
.trade-form-row input, .trade-form-row select { flex: 1; }
.btn-execute {
  width: 100%; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700;
  margin-top: 8px; transition: opacity 0.15s;
}
.btn-execute:active { opacity: 0.8; }

/* === Modal === */
.modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 600;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-mask.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: #1a1d24; border-radius: 12px; padding: 20px; width: 90%; max-width: 380px; max-height: 80vh; overflow-y: auto;
}
.modal-box h3 { font-size: 16px; margin-bottom: 14px; }
.modal-close-btn {
  float: right; width: 26px; height: 26px; border-radius: 13px;
  background: #242730; display: flex; align-items: center; justify-content: center; font-size: 13px;
}

/* === Bottom Tab Bar === */
.tab-bar {
  display: flex; background: #16181d; border-top: 1px solid #1e2130;
  padding: 6px 0 env(safe-area-inset-bottom, 8px); flex-shrink: 0;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 4px 0; color: #666; transition: color 0.15s; font-size: 10px;
  position: relative;
}
.tab-item.active { color: #3a7bd5; }
.tab-item svg { width: 22px; height: 22px; }
/* AI助手 tab — 发光效果 */
.tab-item.ai-tab {
  margin-top: -14px; position: relative; z-index: 5;
}
.tab-item.ai-tab .ai-tab-icon {
  width: 44px; height: 44px; border-radius: 22px;
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #3a7bd5 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 16px rgba(99,102,241,0.5), 0 0 32px rgba(139,92,246,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
.tab-item.ai-tab:active .ai-tab-icon { transform: scale(0.92); }
.tab-item.ai-tab.active .ai-tab-icon {
  box-shadow: 0 4px 24px rgba(99,102,241,0.7), 0 0 48px rgba(139,92,246,0.5);
}
.tab-item.ai-tab svg { width: 26px; height: 26px; color: #fff; }
.tab-item.ai-tab span { color: #a78bfa; font-weight: 600; margin-top: 2px; }
.tab-item.ai-tab.active span { color: #8b5cf6; }
/* AI助手对话区 */
.ai-chat-area { padding: 0 16px; display: flex; flex-direction: column; }
.ai-chat-msg { padding: 12px 14px; border-radius: 12px; margin-bottom: 10px; max-width: 88%; font-size: 13px; line-height: 1.6; animation: aiMsgIn 0.25s ease; }
@keyframes aiMsgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.ai-chat-msg.bot { background: #1a1d24; border: 1px solid #242730; align-self: flex-start; border-bottom-left-radius: 4px; }
.ai-chat-msg.user { background: #2a3550; border: 1px solid #3a5080; align-self: flex-end; border-bottom-right-radius: 4px; }
.ai-chat-msg .msg-time { font-size: 10px; color: #555; margin-top: 4px; }
.ai-quick-chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 14px; }
.ai-quick-chip {
  padding: 6px 12px; border-radius: 14px; font-size: 11px; background: #1a1d24; color: #999;
  border: 1px solid #242730; white-space: nowrap; transition: all 0.15s;
}
.ai-quick-chip:active { background: #2a3550; border-color: #6366f1; color: #a78bfa; }

/* === Detail Page (pushed view) === */
.detail-page {
  position: absolute; inset: 0; background: #0f1115; z-index: 300;
  transform: translateX(100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column; overflow: hidden;
}
.detail-page.show { transform: translateX(0); }
.detail-header {
  display: flex; align-items: center; padding: 10px 16px; flex-shrink: 0;
  border-bottom: 1px solid #1e2130; gap: 12px;
}
.detail-back {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; background: #1a1d24; font-size: 16px; flex-shrink: 0;
}
.detail-name { font-size: 16px; font-weight: 600; flex: 1; }
.detail-body { flex: 1; overflow-y: auto; padding: 16px; }
.detail-price-row { text-align: center; margin-bottom: 16px; }
.detail-price { font-size: 36px; font-weight: 700; line-height: 1; }
.detail-change { font-size: 14px; margin-top: 4px; }
.detail-meta { display: flex; justify-content: space-around; margin: 14px 0; font-size: 11px; color: #888; }
.detail-meta b { color: #dedede; display: block; font-size: 13px; margin-top: 2px; }

/* === AI Report inside detail === */
.ai-report-section { margin-top: 16px; }
.ai-report-section .metric-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1e2130; font-size: 12px; }
.ai-report-section .section-h { font-size: 13px; font-weight: 600; color: #6ea8fe; margin: 12px 0 6px; padding-left: 8px; border-left: 3px solid #3a7bd5; }
.ai-report-section .advice-box { background: #1e2130; border-radius: 8px; padding: 12px; margin-top: 8px; border-left: 3px solid #f59e0b; font-size: 12px; line-height: 1.6; }

/* === Txn Form inside detail === */
.txn-form { margin-top: 14px; }
.txn-form .form-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
.txn-form .form-row label { width: 40px; color: #888; flex-shrink: 0; }
.txn-form .form-row input, .txn-form .form-row select { flex: 1; font-size: 12px; padding: 6px 8px; }

/* === Scrollbar === */
::-webkit-scrollbar { width: 0; }
</style>
</head>

// ===== TAB SWITCHING =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab-item[data-tab="${tab}"]`).classList.add('active');
  renderMainContent();
}

// ===== RENDER MAIN CONTENT =====
function renderMainContent() {
  const c = document.getElementById('mainScroll');
  switch(currentTab) {
    case 'market': c.innerHTML = renderMarketTab(); break;
    case 'trade': c.innerHTML = renderTradeTab(); break;
    case 'holdings': c.innerHTML = renderHoldingsTab(); break;
    case 'assistant': c.innerHTML = renderAssistantTab(); break;
    case 'me': c.innerHTML = renderMeTab(); break;
  }
}

function sendAiCmd(cmd) {
  const input = document.getElementById('aiCmdInput');
  const text = cmd || input.value.trim();
  if (!text) return;
  if (!cmd) input.value = '';

  const now = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  _aiChatMessages.push({ role: 'user', text: text, time: now });

  // NLP Intent routing
  const s = text.replace(/[，,？?！!。]/g, ' ').trim();
  let reply = '';

  // Try watchdog creation first
  const wdResult = tryParseWatchdog(s);
  if (wdResult) {
    const nextId = _watchdogTasks.length > 0 ? Math.max(..._watchdogTasks.map(t => t.id)) + 1 : 1;
    _watchdogTasks.push({ id: nextId, ...wdResult, status: 'active', created_at: now });
    reply = wdResult.reply;
  } else if (s.indexOf('大盘') >= 0 || s.indexOf('市场') >= 0 || s.indexOf('指数') >= 0) {
    reply = '📈 <b>今日市场概况</b><br>上证指数 <b style="color:#10b981">3,287.42 (+0.82%)</b><br>深证成指 <b style="color:#10b981">11,056.38 (+1.15%)</b><br>创业板指 <b style="color:#10b981">2,156.80 (+1.42%)</b><br>北向资金净流入 <b>+35.4亿</b><br>两市成交额 <b>6,820亿</b>（较昨日+8.2%）<br><span style="color:#10b981">涨停 47 家</span> / <span style="color:#ef4444">跌停 12 家</span>';
  } else if (s.indexOf('推荐') >= 0 || s.indexOf('选股') >= 0 || s.indexOf('AI评分') >= 0) {
    const top6 = [...stockData].sort((a, b) => b.aiScore - a.aiScore).slice(0, 6);
    reply = '⭐ <b>AI 智能选股 TOP6</b><br>' + top6.map((s, i) => {
      const sign = s.pct >= 0 ? '+' : '';
      const clr = s.pct >= 0 ? '#10b981' : '#ef4444';
      return `${i + 1}. <b>${s.name}</b>(${s.code}) ✦${s.aiScore} | ¥${s.price.toFixed(2)} <span style="color:${clr}">${sign}${s.pct.toFixed(2)}%</span> | PE ${s.pe} | ${s.sector}`;
    }).join('<br>') + '<br><span style="color:#888;font-size:11px">点击下方"AI选股"查看更多 →</span>';
  } else if (s.indexOf('持仓') >= 0 || s.indexOf('盈亏') >= 0 || s.indexOf('赚') >= 0 || s.indexOf('亏') >= 0) {
    const totalV = holdings.reduce((s, h) => s + h.price * h.shares, 0);
    const totalC = holdings.reduce((s, h) => s + h.cost * h.shares, 0);
    const pnl = totalV - totalC;
    const clr = pnl >= 0 ? '#10b981' : '#ef4444';
    const sign = pnl >= 0 ? '+' : '';
    reply = '💰 <b>持仓概览</b><br>总市值: <b>¥' + totalV.toLocaleString() + '</b><br>总成本: ¥' + totalC.toLocaleString() + '<br>总盈亏: <b style="color:' + clr + '">' + sign + '¥' + pnl.toLocaleString() + ' (' + sign + (pnl / totalC * 100).toFixed(2) + '%)</b><br><br>' +
      holdings.map(h => {
        const hp = (h.price - h.cost) * h.shares;
        const hpSign = hp >= 0 ? '+' : '';
        const hpClr = hp >= 0 ? '#10b981' : '#ef4444';
        const hpPct = ((h.price - h.cost) / h.cost * 100);
        const acct = brokerageAccounts.find(a => a.id === h.account_id);
        return '• <b>' + h.name + '</b>(' + h.code + ') ' + h.shares + '股 | 成本¥' + h.cost.toFixed(2) + ' → 现价¥' + h.price.toFixed(2) + ' | <span style="color:' + hpClr + '">' + hpSign + '¥' + hp.toFixed(0) + ' (' + hpSign + hpPct.toFixed(1) + '%)</span> | ' + (acct ? acct.brokerage : '');
      }).join('<br>') + '<br><span style="color:#888;font-size:11px">点击下方"持仓"查看详情 →</span>';
  } else if (s.indexOf('交易') >= 0 || s.indexOf('记录') >= 0 || s.indexOf('历史') >= 0) {
    const allTxns = Object.values(transactions).flat().sort((a, b) => b.date.localeCompare(a.date)).slice(0, 8);
    if (allTxns.length === 0) {

// ----- NLP Watchdog Parser (integrated into assistant) -----
function tryParseWatchdog(s) {
  let code = null, name = null, direction = null, threshold = null, action_type = 'notify', shares = 0, task_type = 'price_low';
  for (let i = 0; i < stockData.length; i++) {
    if (s.indexOf(stockData[i].name) >= 0 || s.indexOf(stockData[i].code) >= 0) {
      code = stockData[i].code; name = stockData[i].name; break;
    }
  }
  if (!code) {
    if (s.indexOf('茅台') >= 0) { code = '600519'; name = '贵州茅台'; }
    else if (s.indexOf('五粮液') >= 0 || s.indexOf('五粮') >= 0) { code = '000858'; name = '五粮液'; }
    else if (s.indexOf('宁德') >= 0) { code = '300750'; name = '宁德时代'; }
    else if (s.indexOf('隆基') >= 0) { code = '601012'; name = '隆基绿能'; }
    else if (s.indexOf('比亚迪') >= 0) { code = '002594'; name = '比亚迪'; }
    else if (s.indexOf('金山') >= 0) { code = '688111'; name = '金山办公'; }
    else return null;
  }
  const priceMatch = s.match(/(\d+\.?\d*)\s*元/);
  if (priceMatch) threshold = parseFloat(priceMatch[1]);
  if (!threshold) return null;

  if (s.indexOf('低于') >= 0 || s.indexOf('跌破') >= 0 || s.indexOf('跌到') >= 0) { direction = 'below'; task_type = 'price_low'; }
  else if (s.indexOf('高于') >= 0 || s.indexOf('突破') >= 0 || s.indexOf('涨到') >= 0 || s.indexOf('涨至') >= 0) { direction = 'above'; task_type = 'price_high'; }
  else { direction = 'below'; task_type = 'price_low'; }

  if (s.indexOf('自动卖出') >= 0 || s.indexOf('卖出') >= 0) { action_type = 'trade'; task_type = 'auto_sell'; }
  else if (s.indexOf('自动买入') >= 0 || s.indexOf('买入') >= 0) { action_type = 'trade'; task_type = 'auto_buy'; }
  else if (s.indexOf('提醒') >= 0 || s.indexOf('通知') >= 0) { action_type = 'notify'; }
  else { action_type = 'notify'; }

  if (action_type === 'trade') {
    const shareMatch = s.match(/(\d+)\s*股/);
    shares = shareMatch ? parseInt(shareMatch[1]) : 100;
  }

  const condDesc = name + (direction === 'below' ? '低于' : '高于') + threshold + '元' + (action_type === 'trade' ? (task_type === 'auto_sell' ? '自动卖出' : '自动买入') + shares + '股' : '提醒');
  const emoji = action_type === 'trade' ? '⚡' : '🔔';
  return {
    code, name, task_type, direction, threshold_price: threshold, action_type, shares,
    condition_desc: condDesc,
    reply: `${emoji} <b>看守任务已创建</b><br>股票: <b>${name}</b>(${code})<br>条件: ${condDesc}<br>状态: <span style="color:#10b981">● 活跃监测中</span><br><span style="color:#888;font-size:11px">每30秒自动检测一次，满足条件时触发通知</span>`
  };
}

  document.getElementById('detailName').innerHTML = `${s.name} <span style="font-size:11px;color:#666">${s.code}</span>`;

  // Price history for chart
  const priceHistory = [];
  const basePrice = h ? h.cost : s.price;
  for (let i = 0; i < 60; i++) {
    priceHistory.push(basePrice * (0.9 + Math.random() * 0.2) + (Math.random() - 0.48) * basePrice * 0.05 * i);
  }

  // Chart SVG
  function chartSVG() {
    const w=350, h=160, pad={top:10,right:10,bottom:20,left:40};
    const cw=w-pad.left-pad.right, ch=h-pad.top-pad.bottom;
    const min=Math.min(...priceHistory)*0.98, max=Math.max(...priceHistory)*1.02, range=max-min||1;
    const pts = priceHistory.map((v,i) => `${pad.left+i*(cw/(priceHistory.length-1))},${pad.top+ch-(v-min)/range*ch}`).join(' ');

    let markers = '';
    txn.forEach(t => {
      const idx = Math.floor(Math.random() * priceHistory.length);
      const x = pad.left + idx*(cw/(priceHistory.length-1));

      const color = t.type === 'buy' ? '#10b981' : '#ef4444';

      markers += `<text x="${x}" y="${y-2}" text-anchor="middle" fill="${color}" font-size="11">${symbol}</text>`;

    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:160px">

    <div style="margin-top:16px">
      <div style="font-weight:600;margin-bottom:8px">交易记录 <button style="margin-left:8px;padding:4px 10px;border-radius:6px;background:#242730;font-size:11px" onclick="openAddTradeSheet()">+ 添加</button></div>
      <div>${txnList || '<div style="color:#666;padding:10px">暂无交易记录</div>'}</div>
    </div>
    <div style="margin-top:16px">
      <button style="width:100%;padding:12px;border-radius:10px;background:#242730;font-size:14px;border:1px solid #3a7bd5;color:#6ea8fe" onclick="generateAiReport('${code}')">🤖 AI 分析此股</button>
      <div id="aiReportArea"></div>
    </div>
  `;

  document.getElementById('detailPage').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailPage').classList.remove('show');
  document.getElementById('aiReportArea') && (document.getElementById('aiReportArea').innerHTML = '');
}

// ===== AI REPORT (inline in detail) =====
function generateAiReport(code) {
  const h = holdings.find(x => x.code === code);
  if (!h) { showModal('提示', '该股票不在持仓中，无法生成分析报告'); return; }
  const txn = transactions[code] || [];
  const pnl = (h.price - h.cost) * h.shares;
  const pnlPct = ((h.price - h.cost) / h.cost * 100);
  const sgn = pnl >= 0 ? '+' : '';
  const buyTxns = txn.filter(t => t.type === 'buy');
  const sellTxns = txn.filter(t => t.type === 'sell');
  const prices = txn.map(t => t.price);
  const bestBuy = Math.min(...buyTxns.map(t => t.price));
  const worstBuy = Math.max(...buyTxns.map(t => t.price));
  const volatility = prices.length > 1 ? ((Math.max(...prices)-Math.min(...prices))/(prices.reduce((a,b)=>a+b,0)/prices.length)*100).toFixed(1) : '0';
  const clr = pnl >= 0 ? '#10b981' : '#ef4444';

  let advice = '';
  if (pnlPct > 15) advice = '该股盈利丰厚，建议分批止盈，锁定利润。可将止损位上移至成本价上方15%，确保盈利不回吐。';
  else if (pnlPct > 5) advice = '该股运行良好，建议继续持有。将止损位上移至盈亏平衡线，观察后续走势再决定是否加仓。';
  else if (pnlPct > -5) advice = '该股接近成本线，建议密切关注。如跌破关键支撑位应及时止损，不宜追加仓位。';
  else advice = '该股目前处于亏损状态，建议冷静评估基本面是否恶化。若基本面未变可等待反弹，若逻辑破坏应及时止损，保留资金。';

  document.getElementById('aiReportArea').innerHTML = `
    <div class="ai-report-section" style="margin-top:12px">
      <div style="font-weight:600;margin-bottom:8px">AI 交易分析报告</div>
      <div class="metric-row"><span>持仓状态</span><span style="color:${clr};font-weight:600">${pnl>=0?'盈利中':'亏损中'}</span></div>
      <div class="metric-row"><span>浮动盈亏</span><span style="color:${clr}">${sgn}¥${pnl.toFixed(0)} (${sgn}${pnlPct.toFixed(2)}%)</span></div>
      <div class="metric-row"><span>持仓成本</span><span>¥${h.cost.toFixed(0)}</span></div>
      <div class="metric-row"><span>现价</span><span>¥${h.price.toFixed(0)}</span></div>
      <div class="metric-row"><span>波动率(6月)</span><span>${volatility}%</span></div>
      <div class="metric-row"><span>交易笔数</span><span>买入${buyTxns.length}笔 · 卖出${sellTxns.length}笔</span></div>
      <div class="section-h">择时分析</div>
      <p style="font-size:12px;color:#999">最佳买入 ¥${bestBuy.toFixed(0)}，较现价低 ${((h.price-bestBuy)/bestBuy*100).toFixed(1)}%。${buyTxns.length>1?'多次买入分散了入场风险。':'单次买入风险集中，建议分批次建仓。'}</p>
      <div class="section-h">交易行为分析</div>
      <p style="font-size:12px;color:#999">买入/卖出比 ${buyTxns.length}:${sellTxns.length}。${sellTxns.length<buyTxns.length*0.3?'卖出次数偏少，建议适当止盈。':'买卖纪律良好。'}</p>
      <div class="section-h">操作建议</div>
      <div class="advice-box">${advice}</div>
      <p style="font-size:10px;color:#555;margin-top:8px">以上分析基于模拟数据，AI自动生成，仅供参考，不构成投资建议。</p>
    </div>`;
}

// ===== TRADE SHEET (bottom panel) =====
function openTradeSheet(code, defaultType) {
  currentSheetType = 'trade';
  currentDetailCode = code;
  const s = stockData.find(x => x.code === code);
  const h = holdings.find(x => x.code === code);

  document.getElementById('bottomSheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-close" onclick="closeSheet()">✕</div>
    <div class="sheet-title">快速交易 · ${s.name} (${s.code})</div>
    <div style="font-size:12px;color:#888;margin-bottom:12px">现价 ¥${s.price.toFixed(2)} ${s.pct>=0?'+':''}${s.pct.toFixed(2)}%</div>
    <div class="trade-type-tabs">
      <div class="trade-type-tab buy-tab ${defaultType==='sell'?'':'active'}" onclick="switchTradeType('buy')">买入</div>
      <div class="trade-type-tab sell-tab ${defaultType==='sell'?'active':''}" onclick="switchTradeType('sell')">卖出</div>
    </div>
    <div class="trade-form-row"><label>价格</label><input type="number" id="tradePrice" value="${s.price.toFixed(2)}" step="0.01"></div>
    <div class="trade-form-row"><label>数量</label><input type="number" id="tradeQty" placeholder="股" value="100"></div>
    <div style="font-size:12px;color:#888;margin-bottom:12px" id="tradeEstimate">预估金额：¥${(s.price*100).toLocaleString()}</div>
    <button class="btn-execute" id="tradeExecBtn" style="background:${defaultType==='sell'?'#ef4444':'#10b981'};color:#fff" onclick="executeTrade()">确认${defaultType==='sell'?'卖出':'买入'}</button>
  `;
  // Bind estimate update after DOM is ready
  setTimeout(() => {
    const tp = document.getElementById('tradePrice');
    const tq = document.getElementById('tradeQty');
    if (tp && tq) {
      const updateEst = () => {
        const p = parseFloat(tp.value) || 0;
        const q = parseInt(tq.value) || 0;
        const te = document.getElementById('tradeEstimate');
        if (te) te.textContent = '预估金额：¥' + (p*q).toLocaleString();
      };
      tp.oninput = updateEst;
      tq.oninput = updateEst;
    }
  }, 50);
  document.getElementById('bottomSheet').classList.add('show');
  document.getElementById('sheetMask').classList.add('show');
}

function switchTradeType(type) {
  document.querySelectorAll('.trade-type-tab').forEach(el => el.classList.remove('active'));
  document.querySelector(`.trade-type-tab.${type}-tab`).classList.add('active');
  const btn = document.getElementById('tradeExecBtn');
  if (type === 'buy') { btn.style.background = '#10b981'; btn.textContent = '确认买入'; }
  else { btn.style.background = '#ef4444'; btn.textContent = '确认卖出'; }
}

function executeTrade() {
  const code = currentDetailCode;
  const price = parseFloat(document.getElementById('tradePrice').value);
  const qty = parseInt(document.getElementById('tradeQty').value);
  if (isNaN(price) || isNaN(qty) || qty <= 0) { alert('请填写完整信息'); return; }
  const buyTab = document.querySelector('.trade-type-tab.buy-tab.active');
  const type = buyTab ? 'buy' : 'sell';
  const today = new Date().toISOString().split('T')[0];

  if (!transactions[code]) transactions[code] = [];
  transactions[code].push({ date: today, type, price, shares: qty, note: '' });
  transactions[code].sort((a,b) => a.date.localeCompare(b.date));

  closeSheet();
  // Refresh
  if (document.getElementById('detailPage').classList.contains('show')) {
    openDetail(code);
  }
  renderMainContent();
  alert(`${type==='buy'?'买入':'卖出'}成功！${stockData.find(s=>s.code===code).name} ¥${price.toFixed(0)} × ${qty}股`);
}

// ===== ADD TXN SHEET =====
function openAddTradeSheet() {
  currentSheetType = 'addTxn';
  const stockOptions = holdings.map(h => `<option value="${h.code}" ${h.code===currentDetailCode?'selected':''}>${h.name} (${h.code})</option>`).join('');

  document.getElementById('bottomSheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-close" onclick="closeSheet()">✕</div>
    <div class="sheet-title">记录交易</div>
    <div class="txn-form">
      <div class="form-row"><label>股票</label><select id="txnStock">${stockOptions}</select></div>
      <div class="form-row"><label>方向</label><select id="txnType"><option value="buy">买入</option><option value="sell">卖出</option></select></div>
      <div class="form-row"><label>日期</label><input type="date" id="txnDate" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-row"><label>价格</label><input type="number" id="txnPrice" placeholder="成交价" step="0.01"></div>
      <div class="form-row"><label>数量</label><input type="number" id="txnShares" placeholder="股"></div>
      <div class="form-row"><label>备注</label><input type="text" id="txnNote" placeholder="可选"></div>
    </div>
    <button class="btn-execute" style="background:#3a7bd5;color:#fff" onclick="submitAddTrade()">确认添加</button>
  `;
  document.getElementById('bottomSheet').classList.add('show');
  document.getElementById('sheetMask').classList.add('show');
}

function submitAddTrade() {
  const code = document.getElementById('txnStock').value;
  const type = document.getElementById('txnType').value;
  const date = document.getElementById('txnDate').value;
  const price = parseFloat(document.getElementById('txnPrice').value);
  const shares = parseInt(document.getElementById('txnShares').value);
  const note = document.getElementById('txnNote').value;
  if (!date || isNaN(price) || isNaN(shares) || shares <= 0) { alert('请填写完整信息'); return; }

  if (!transactions[code]) transactions[code] = [];
  transactions[code].push({ date, type, price, shares, note });
  transactions[code].sort((a,b) => a.date.localeCompare(b.date));

  closeSheet();
  if (document.getElementById('detailPage').classList.contains('show')) {
    openDetail(code);
  }
  renderMainContent();
}

function deleteTxn(code, date, type) {
  if (!transactions[code]) return;
  const idx = transactions[code].findIndex(t => t.date === date && t.type === type);
  if (idx >= 0) transactions[code].splice(idx, 1);
  openDetail(code);
}

// ===== SHEET / MODAL =====
function openSheet(type) { currentSheetType = type; if (type === 'addTxn') openAddTradeSheet(); }
function closeSheet() {
  document.getElementById('bottomSheet').classList.remove('show');
  document.getElementById('sheetMask').classList.remove('show');
}
function showModal(title, msg) {
  document.getElementById('modalBox').innerHTML = `
    <div class="modal-close-btn" onclick="closeModal()">✕</div>
    <h3>${title}</h3><p style="color:#999;font-size:13px">${msg}</p>
    <button style="margin-top:14px;width:100%;padding:10px;border-radius:8px;background:#3a7bd5;color:#fff;font-size:14px" onclick="closeModal()">确定</button>`;
  document.getElementById('modalMask').classList.add('show');
}
function closeModal() { document.getElementById('modalMask').classList.remove('show'); }

// ===== UTILS =====
function toggleSearch() { showModal('搜索', '搜索功能将在后续迭代中接入实时行情API'); }
function showNotifications() { showModal('消息', '暂无新消息。AI Agent 交易提醒将在此处推送。'); }

// ===== RECENT TXNS (trade tab) =====
function renderRecentTxns() {
  const el = document.getElementById('recentTxns');
  if (!el) return;
  const allTxns = Object.values(transactions).flat().sort((a,b) => b.date.localeCompare(a.date));
  el.innerHTML = allTxns.slice(0, 10).map(t => {
    const stock = holdings.find(h => h.code === t.code) || stockData.find(s => s.code === t.code);
    return `<div class="txn-item">
      <span><span class="txn-tag" style="background:${t.type==='buy'?'rgba(16,185,129,0.15)':'rgba(239,68,68,0.15)'};color:${t.type==='buy'?'#10b981':'#ef4444'}">${t.type==='buy'?'买入':'卖出'}</span> ${t.date}</span>
      <span style="color:#888">${stock?stock.name:t.code} ¥${t.price.toFixed(0)}×${t.shares}</span>
    </div>`;
  }).join('') || '<div style="color:#666;padding:10px">暂无交易记录</div>';
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  renderIndexStrip();
  renderAiInsight();
  renderMainContent();
  // Refresh recent txns after trade tab content is rendered
  setTimeout(renderRecentTxns, 100);
});

// Watch for trade tab switches to refresh recent txns
const origSwitchTab = switchTab;
switchTab = function(tab) {
  origSwitchTab(tab);
  if (tab === 'trade') setTimeout(renderRecentTxns, 150);
  if (tab === 'assistant') setTimeout(function() {
    var chatArea = document.getElementById('aiChatArea');
    if (chatArea) chatArea.scrollTop = chatArea.scrollHeight;
  }, 200);
};
</script>
