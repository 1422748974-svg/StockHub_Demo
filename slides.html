<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockHub · 设计提案</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  font-size:15px;color:#e0e0e0;background:#0d1117;
  line-height:1.5;-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}

/* container */
#deck{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* top bar */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;background:#161b22;border-bottom:1px solid #21262d;
  flex-shrink:0;z-index:10;
}
#topbar .logo{font-size:18px;font-weight:700;color:#f0f0f0;letter-spacing:-0.3px}
#topbar .logo span{color:#3a7bd5}
#topbar .pager{font-size:13px;color:#8b949e;font-family:"SF Mono","Consolas",monospace}
#topbar .home-btn{
  font-size:13px;color:#8b949e;padding:6px 14px;border-radius:6px;
  border:1px solid #30363d;transition:all .2s;
}
#topbar .home-btn:hover{color:#e0e0e0;border-color:#3a7bd5}

/* slides area */
#slides{flex:1;overflow:hidden;position:relative}

.slide{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:48px 56px;display:flex;flex-direction:column;justify-content:center;
  opacity:0;transform:translateX(40px);transition:opacity .35s ease,transform .35s ease;
  pointer-events:none;
}
.slide.active{opacity:1;transform:translateX(0);pointer-events:auto}

.slide-cover{text-align:center;align-items:center;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1a1d24 100%)}
.slide-content{align-items:flex-start}

/* nav arrows */
.nav-arrow{
  position:fixed;top:50%;transform:translateY(-50%);z-index:20;
  width:44px;height:44px;border-radius:50%;background:rgba(22,27,34,0.9);
  border:1px solid #30363d;font-size:20px;color:#8b949e;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(8px);
}
.nav-arrow:hover{background:#1a1d24;border-color:#3a7bd5;color:#e0e0e0}
.nav-arrow.disabled{opacity:.25;pointer-events:none}
#prev{left:20px}
#next{right:20px}

/* bottom dots */
#dots{
  display:flex;gap:8px;justify-content:center;padding:12px;
  background:#161b22;border-top:1px solid #21262d;flex-shrink:0;
}
.dot{
  width:8px;height:8px;border-radius:50%;background:#30363d;
  transition:all .25s;cursor:pointer;
}
.dot.active{background:#3a7bd5;width:24px;border-radius:4px}
.dot:hover{background:#4a8be5}

/* typography */
.slide-title{font-size:38px;font-weight:700;line-height:1.2;margin-bottom:16px;color:#f0f0f0}
.slide-subtitle{font-size:18px;color:#8b949e;margin-bottom:8px}
.slide-section{font-size:28px;font-weight:700;color:#f0f0f0;margin-bottom:24px}
.slide-body{font-size:16px;color:#c9d1d9;max-width:800px}
.slide-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;margin:4px;
  background:rgba(58,123,213,0.15);color:#58a6ff;border:1px solid rgba(58,123,213,0.3)}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600}
.badge-blue{background:rgba(58,123,213,0.2);color:#58a6ff}
.badge-green{background:rgba(63,185,80,0.2);color:#3fb950}
.badge-orange{background:rgba(240,136,62,0.2);color:#f0883e}
.badge-purple{background:rgba(188,140,255,0.2);color:#bc8cff}

/* cover */
.cover-icon{font-size:64px;margin-bottom:24px}
.cover-title{font-size:52px;font-weight:800;color:#f0f0f0;letter-spacing:-1px;margin-bottom:12px}
.cover-title span{color:#3a7bd5}
.cover-sub{font-size:20px;color:#8b949e;margin-bottom:32px}
.cover-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px}
.cover-footer{font-size:13px;color:#484f58;margin-top:8px}

/* grid cards */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:28px;width:100%;max-width:960px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;width:100%;max-width:960px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;width:100%;max-width:960px}
.card{
  background:#161b22;border:1px solid #21262d;border-radius:12px;
  padding:24px;transition:all .2s;
}
.card:hover{border-color:#30363d}
.card-icon{font-size:28px;margin-bottom:12px}
.card-title{font-size:17px;font-weight:600;color:#f0f0f0;margin-bottom:8px}
.card-desc{font-size:14px;color:#8b949e;line-height:1.6}

/* flow chart */
.flow{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin:24px 0}
.flow-step{
  padding:14px 22px;background:#161b22;border:1px solid #21262d;
  border-radius:10px;font-size:15px;text-align:center;min-width:110px;
}
.flow-step .num{font-size:24px;font-weight:700;color:#3a7bd5;display:block;margin-bottom:4px}
.flow-step .lbl{font-size:13px;color:#c9d1d9}
.flow-arrow{font-size:20px;color:#484f58}

/* feature grid */
.feat{display:flex;align-items:flex-start;gap:16px;padding:16px;background:#161b22;
  border:1px solid #21262d;border-radius:10px;transition:all .2s}
.feat:hover{border-color:#30363d}
.feat-icon{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.feat-body{flex:1}
.feat-title{font-size:16px;font-weight:600;color:#f0f0f0;margin-bottom:4px}
.feat-desc{font-size:13px;color:#8b949e;line-height:1.5}

/* table */
.comparison{width:100%;border-collapse:collapse;font-size:14px;margin:20px 0}
.comparison th{
  background:#161b22;color:#8b949e;font-weight:600;text-align:left;
  padding:10px 14px;border-bottom:2px solid #21262d;font-size:13px;
}
.comparison td{
  padding:10px 14px;border-bottom:1px solid #21262d;color:#c9d1d9;
}
.comparison tr:last-child td{border-bottom:none}
.comparison .highlight td{background:rgba(58,123,213,0.08);color:#58a6ff}

/* NPL example */
.nlp-box{
  background:#161b22;border:1px solid #30363d;border-radius:10px;
  padding:16px;margin-bottom:10px;font-size:14px;font-family:"SF Mono","Consolas",monospace;
}
.nlp-box .input{color:#3fb950}
.nlp-box .arrow{color:#8b949e;margin:0 8px}
.nlp-box .output{color:#58a6ff}

/* analysis cards */
.insight-card{
  background:#161b22;border:1px solid #21262d;border-radius:10px;
  padding:20px;text-align:center;min-width:120px;
}
.insight-card .val{font-size:30px;font-weight:700;color:#3fb950}
.insight-card .lbl{font-size:13px;color:#8b949e;margin-top:4px}

/* timeline */
.timeline{display:flex;flex-direction:column;gap:20px;max-width:800px}
.tl-row{display:flex;align-items:flex-start;gap:16px}
.tl-icon{font-size:22px;flex-shrink:0;width:36px;text-align:center;padding-top:2px}
.tl-content{flex:1;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px}
.tl-title{font-size:16px;font-weight:600;color:#f0f0f0;margin-bottom:6px}
.tl-body{font-size:14px;color:#8b949e;line-height:1.6}

/* phases */
.phases{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:960px}
.phase{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:20px;text-align:center}
.phase-num{font-size:13px;color:#3a7bd5;font-weight:600;margin-bottom:8px}
.phase-title{font-size:16px;font-weight:700;color:#f0f0f0;margin-bottom:12px}
.phase-items{font-size:13px;color:#8b949e;line-height:1.7;text-align:left}

/* big stat */
.big-stat{font-size:18px;color:#c9d1d9;text-align:center;margin:20px 0;line-height:1.8}
.big-stat strong{color:#58a6ff}

/* scrollbar */
.slide::-webkit-scrollbar{width:6px}
.slide::-webkit-scrollbar-track{background:transparent}
.slide::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}

/* keyframe */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.pulse{animation:pulse 2s infinite}

/* responsive */
@media(max-width:768px){
  .slide{padding:32px 24px}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .phases{grid-template-columns:1fr 1fr}
  .slide-title{font-size:28px}
  .cover-title{font-size:36px}
  .nav-arrow{width:36px;height:36px;font-size:16px}
}
</style>
</head>

var current=0;
var container=document.getElementById('slides');
var dotsEl=document.getElementById('dots');

function render(){
  container.innerHTML=slides.map(function(s,i){
    return '<div class="slide'+(i===0?' active':'')+'" id="s'+i+'">'+s+'</div>';
  }).join('');
  dotsEl.innerHTML=slides.map(function(_,i){
    return '<div class="dot'+(i===0?' active':'')+'" onclick="jump('+i+')"></div>';
  }).join('');
  updateNav();
}

render();

function go(dir){
  var next=current+dir;
  if(next<0||next>=slides.length)return;
  jump(next);
}

function jump(i){
  var old=document.getElementById('s'+current);
  var el=document.getElementById('s'+i);
  if(!el)return;
  old.classList.remove('active');
  el.classList.add('active');
  el.scrollTop=0;
  document.querySelectorAll('.dot').forEach(function(d,j){d.classList.toggle('active',j===i)});
  current=i;
  document.getElementById('pager').textContent=(i+1)+' / '+slides.length;
  updateNav();
}

function updateNav(){
  document.getElementById('prev').classList.toggle('disabled',current===0);
  document.getElementById('next').classList.toggle('disabled',current===slides.length-1);
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='ArrowRight')go(1);
});

// touch swipe
var ts=0;
document.addEventListener('touchstart',function(e){ts=e.touches[0].clientX});
document.addEventListener('touchend',function(e){
  var d=ts-e.changedTouches[0].clientX;
  if(Math.abs(d)>50)d>0?go(1):go(-1);
});
</script>
